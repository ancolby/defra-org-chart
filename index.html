<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/defra-org-chart/">
    <title>DEFRA Organizational Chart</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="header">
        <h1>DEFRA Senior Civil Service Organizational Chart</h1>
        <div id="controls">
            <button id="expand-all">Expand All</button>
            <button id="collapse-all">Collapse All</button>
            <button id="export-powerpoint" title="Export current view to PowerPoint">📊 Export to PowerPoint</button>
            <input type="text" id="search" placeholder="Search by name or position...">
            <div id="legend">
                <div class="legend-item"><span class="legend-color scs4"></span>SCS4 - Permanent Secretary</div>
                <div class="legend-item"><span class="legend-color scs3"></span>SCS3 - Directors General</div>
                <div class="legend-item"><span class="legend-color scs2"></span>SCS2 - Directors</div>
                <div class="legend-item"><span class="legend-color scs1"></span>SCS1 - Deputy Directors</div>
            </div>
        </div>
    </div>
    <div id="chart-container">
        <div id="loading" class="loading-overlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading DEFRA organizational data...</div>
        </div>
        <svg id="org-chart"></svg>
    </div>
    <div id="tooltip"></div>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="client-powerpoint-generator.js"></script>
    <script src="data-processor.js"></script>
    <script src="script.js"></script>
</body>
</html>
